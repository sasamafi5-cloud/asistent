<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e8edf3">
<title>AI Asistent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#e8edf3;--sh:6px 6px 14px #b8c5d0,-6px -6px 14px #fff;--ins:inset 4px 4px 10px #b8c5d0,inset -4px -4px 10px #fff;--bsh:4px 4px 10px #b8c5d0,-4px -4px 10px #fff;--tx:#2a3a4a;--tx2:#2a3a4a88;--ac:#00c8b4}
.dk{--bg:#1a2030;--sh:6px 6px 14px #0d1118,-6px -6px 14px #252f42;--ins:inset 4px 4px 10px #0a0f1a,inset -4px -4px 10px #1e2a3a;--bsh:3px 3px 8px #0d1118,-3px -3px 8px #252f42;--tx:#e0eaf5;--tx2:#e0eaf588}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',sans-serif;min-height:100vh;transition:background .3s}
.c{background:linear-gradient(145deg,#f0f4f8,#d9e2ec);box-shadow:var(--sh);border-radius:18px;border:1px solid rgba(255,255,255,.2)}
.dk .c{background:linear-gradient(145deg,#1e2535,#151c28)}
.i{background:var(--bg);box-shadow:var(--ins);border-radius:12px}
.b{background:linear-gradient(145deg,#f0f4f8,#d9e2ec);box-shadow:var(--bsh);border-radius:50px;border:none;cursor:pointer;color:var(--tx);font-family:inherit;transition:all .2s}
.dk .b,.dk .c{background:linear-gradient(145deg,#1e2535,#151c28)}
.b:active,.dk .b:active{box-shadow:var(--ins)}
input,textarea{background:var(--bg);box-shadow:var(--ins);border-radius:12px;border:none;color:var(--tx);font-family:inherit;outline:none;width:100%;padding:10px 14px;font-size:13px}
input::placeholder,textarea::placeholder{color:var(--tx2)}
#wrap{max-width:480px;margin:0 auto;padding:0 0 130px}
.hdr{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:flex-start}
.clk{font-size:30px;font-weight:900;letter-spacing:-1px}
.dbar{padding:6px 16px 0;font-size:12px;font-weight:700;color:var(--ac);text-transform:capitalize}
.tabs{display:inline-flex;gap:2px;padding:6px 8px}
.tb{padding:6px 14px;font-size:13px;font-weight:700;border-radius:50px;border:none;cursor:pointer;font-family:inherit;background:transparent;box-shadow:none;color:var(--tx2);transition:all .2s}
.tb.on{background:linear-gradient(145deg,#f0f4f8,#d9e2ec);box-shadow:var(--bsh);color:var(--ac)}
.dk .tb.on{background:linear-gradient(145deg,#1e2535,#151c28)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 14px 0}
.col{display:flex;flex-direction:column;gap:12px}
.sec{padding:14px 12px}
.st{font-size:13px;font-weight:800;margin-bottom:10px}
.ri{padding:8px 10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.bdg{border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.tg{padding:2px 6px;border-radius:8px;font-size:9px;font-weight:800;color:#fff}
.tli{padding:7px 10px;margin-bottom:5px;border-radius:0 10px 10px 0;border-left-width:3px;border-left-style:solid}
.mw{position:relative;display:inline-block}
.mbig{width:66px;height:66px;border-radius:50%;border:none;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;transition:all .3s;position:relative;z-index:1;background:linear-gradient(145deg,#f0f4f8,#d9e2ec);box-shadow:6px 6px 16px #b8c5d0,-6px -6px 16px #fff}
.dk .mbig{background:linear-gradient(145deg,#1e2535,#151c28)}
.mbig.on{background:linear-gradient(135deg,var(--ac),#00a896)!important;box-shadow:0 0 30px #00c8b488,0 0 60px #00c8b444!important;animation:gp 1.5s ease-in-out infinite}
.msm{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .3s;background:linear-gradient(145deg,#f0f4f8,#d9e2ec);box-shadow:var(--bsh)}
.dk .msm{background:linear-gradient(145deg,#1e2535,#151c28)}
.msm.on{background:linear-gradient(135deg,var(--ac),#00a896)!important;box-shadow:0 0 20px #00c8b488!important}
@keyframes pr{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.7);opacity:0}}
@keyframes gp{0%,100%{box-shadow:0 0 20px #00c8b444}50%{box-shadow:0 0 35px #00c8b488,0 0 60px #00c8b444}}
@keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fa{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wv{0%,100%{height:4px}50%{height:20px}}
.pr{position:absolute;inset:-8px;border-radius:50%;pointer-events:none}
.pr span{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(0,220,200,.5);animation:pr 1.8s ease-out infinite}
.pr span:nth-child(2){animation-delay:.6s}
.pr span:nth-child(3){animation-delay:1.2s}
.wb{width:3px;border-radius:3px;background:linear-gradient(to top,#00c8b4,#00e8d0);transition:height .15s ease}
.bbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:linear-gradient(145deg,#f0f4f8,#d9e2ec);box-shadow:var(--sh);border-radius:24px 24px 0 0;padding:14px 20px 28px;display:flex;justify-content:space-between;align-items:center;z-index:200}
.dk .bbar{background:linear-gradient(145deg,#1e2535,#151c28)}
.fab{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:18px}
.fg{display:flex;gap:14px}
.sbar{position:fixed;bottom:108px;left:50%;transform:translateX(-50%);z-index:150;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.sbar.show{opacity:1}
.si{padding:8px 20px;border-radius:50px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;color:var(--ac)}
.tgl{width:42px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.tgl-k{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.pnl{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;background:var(--bg)}
.ph{padding:16px;display:flex;justify-content:space-between;align-items:center}
.cm{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;animation:si .2s ease;word-break:break-word}
.msg.u{align-self:flex-end;background:linear-gradient(135deg,var(--ac),#00a896);color:#fff;border-radius:18px 18px 4px 18px}
.msg.a{align-self:flex-start;background:linear-gradient(145deg,#f0f4f8,#d9e2ec);box-shadow:var(--sh);border-radius:18px 18px 18px 4px}
.dk .msg.a{background:linear-gradient(145deg,#1e2535,#151c28)}
.cib{padding:12px 16px 20px}
.dots{display:flex;gap:6px;padding:10px 14px;align-self:flex-start}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ac);animation:wv .8s ease infinite alternate}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
#avf{position:fixed;z-index:1000;cursor:grab;animation:fa 3s ease-in-out infinite}
#avf:active{cursor:grabbing}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;outline:none;box-shadow:none;background:#ccc;padding:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--ac);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.2)}
</style>
</head>
<body>
<div id="wrap">
  <div class="hdr">
    <div>
      <div class="c tabs" id="tabbar">
        <button class="tb on" data-t="pregled">Pregled</button>
        <button class="tb" data-t="beleske">Beleške</button>
        <button class="tb" data-t="alarmi">Alarmi</button>
      </div>
    </div>
    <div style="text-align:right">
      <div class="clk" id="clk">00:00</div>
      <div style="font-size:12px;color:var(--tx2);font-weight:600">Saša</div>
    </div>
  </div>
  <div class="dbar" id="dbar"></div>

  <!-- PREGLED -->
  <div id="tp">
    <div class="g2">
      <div class="col">
        <div class="c sec"><div class="st">📝 Beleške</div><div id="nw"></div></div>
        <div class="c sec"><div class="st">⏰ Alarmi</div><div id="aw"></div></div>
        <div class="c sec"><div class="st">📅 Termini</div><div id="emi"></div></div>
      </div>
      <div class="col">
        <div class="c sec"><div class="st">🗓 Plan</div><div id="tl"></div></div>
        <div class="c sec"><div class="st">✅ To-Do</div><div id="tdl"></div>
          <div style="display:flex;gap:6px;margin-top:8px">
            <input id="tdi" placeholder="Dodaj..." style="font-size:11px;padding:7px 10px">
            <button class="b" onclick="addTd()" style="padding:7px 12px;font-size:14px;color:var(--ac)">+</button>
          </div>
        </div>
        <div class="c sec" style="text-align:center">
          <div style="font-size:11px;color:var(--tx2);font-style:italic;min-height:32px;line-height:1.4;margin-bottom:10px" id="aibox">Pritisni mikrofon!</div>
          <div class="mw" style="display:inline-block">
            <div class="pr" id="pm" style="display:none"><span></span><span></span><span></span></div>
            <button class="msm" id="mm" onclick="togMic()">🎤</button>
          </div>
          <div style="font-size:10px;margin-top:6px;font-weight:700;color:var(--tx2)" id="mml">Pritisni za govor</div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:10px;padding:14px 14px 0">
      <button class="b" onclick="sw('beleske')" style="flex:1;padding:12px 6px;font-size:11px;font-weight:700">📝 Beleška</button>
      <button class="b" onclick="sw('alarmi')" style="flex:1;padding:12px 6px;font-size:11px;font-weight:700">⏰ Alarm</button>
      <button class="b" onclick="sw('termini')" style="flex:1;padding:12px 6px;font-size:11px;font-weight:700">📅 Termin</button>
    </div>
  </div>

  <!-- BELESKE -->
  <div id="tb" style="display:none;padding:14px">
    <div class="c sec" style="margin-bottom:14px">
      <div class="st" style="color:var(--ac)">➕ Nova Beleška</div>
      <input id="nt" placeholder="Naziv..." style="margin-bottom:8px">
      <textarea id="ni" placeholder="Stavke (svaka u novom redu)..." rows="3" style="padding:10px 14px;font-size:12px;resize:none;margin-bottom:8px"></textarea>
      <button class="b" onclick="addN()" style="width:100%;padding:11px;font-size:13px;font-weight:700;color:var(--ac)">Sačuvaj ✓</button>
    </div>
    <div id="nf"></div>
  </div>

  <!-- ALARMI -->
  <div id="ta" style="display:none;padding:14px">
    <div class="c sec" style="margin-bottom:14px">
      <div class="st" style="color:var(--ac)">⏰ Novi Alarm</div>
      <input id="al" placeholder="Naziv alarma..." style="margin-bottom:8px">
      <input type="time" id="at" style="margin-bottom:8px">
      <button class="b" onclick="addA()" style="width:100%;padding:11px;font-size:13px;font-weight:700;color:var(--ac)">Postavi Alarm ⏰</button>
    </div>
    <div id="af"></div>
  </div>

  <!-- TERMINI -->
  <div id="tt" style="display:none;padding:14px">
    <div class="c sec" style="margin-bottom:14px">
      <div class="st" style="color:var(--ac)">📅 Novi Termin</div>
      <input id="et" placeholder="Naziv termina..." style="margin-bottom:8px">
      <input type="time" id="etm" style="margin-bottom:8px">
      <button class="b" onclick="addEv()" style="width:100%;padding:11px;font-size:13px;font-weight:700;color:var(--ac)">Dodaj Termin 📅</button>
    </div>
    <div id="ef"></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bbar">
  <div class="fg">
    <button class="b fab" onclick="sw('pregled');clPnl()">🏠</button>
    <button class="b fab" id="cfab" onclick="togChat()">💬</button>
  </div>
  <div class="mw">
    <div class="pr" id="pM" style="display:none"><span></span><span></span><span></span></div>
    <button class="mbig" id="mM" onclick="togMic()">🎤</button>
  </div>
  <div class="fg">
    <button class="b fab" id="afab" onclick="togAuto()">⚡</button>
    <button class="b fab" onclick="togSet()">⚙️</button>
  </div>
</div>

<!-- STATUS -->
<div class="sbar" id="sb">
  <div class="c si"><div id="ws" style="display:flex;gap:3px;align-items:center"></div><span id="st">...</span></div>
</div>

<!-- CHAT PANEL -->
<div class="pnl" id="cp" style="display:none">
  <div class="ph c" style="border-radius:0">
    <div><div style="font-size:16px;font-weight:900">🤖 AI Asistent</div>
    <div style="font-size:11px;color:var(--ac);font-weight:700" id="csub">Normal • Manual</div></div>
    <button class="b" onclick="togChat()" style="padding:8px 14px">✕</button>
  </div>
  <div class="cm" id="cmsg"></div>
  <div class="c cib" style="border-radius:0">
    <div style="display:flex;gap:10px;margin-bottom:10px">
      <div class="mw" style="flex-shrink:0">
        <div class="pr" id="pC" style="display:none"><span></span><span></span><span></span></div>
        <button class="msm" id="mC" onclick="togMic()">🎤</button>
      </div>
      <input id="ci" placeholder="Pitaj me..." onkeydown="if(event.key==='Enter')sndChat()" style="font-size:13px">
      <button class="b" onclick="sndChat()" style="padding:12px 16px;font-size:16px;color:var(--ac)">➤</button>
    </div>
    <div style="display:flex;gap:8px">
      <button class="b" id="acb" onclick="togAuto()" style="flex:1;padding:8px;font-size:11px;font-weight:700">⚡ Auto</button>
      <button class="b" onclick="setPer('normal')" style="flex:1;padding:8px;font-size:10px;font-weight:800">Normal</button>
      <button class="b" onclick="setPer('pro')" style="flex:1;padding:8px;font-size:10px;font-weight:800">Pro</button>
      <button class="b" onclick="setPer('saljivi')" style="flex:1;padding:8px;font-size:10px;font-weight:800">😂</button>
    </div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="pnl" id="sp" style="display:none">
  <div class="ph c" style="border-radius:0">
    <div style="font-size:18px;font-weight:900">⚙️ Podešavanja</div>
    <button class="b" onclick="togSet()" style="padding:8px 14px">✕</button>
  </div>
  <div style="flex:1;overflow-y:auto;padding:16px">
    <div class="c sec" style="margin-bottom:12px">
      <div class="st" style="color:var(--ac)">🔑 API Ključ</div>
      <input type="password" id="aki" placeholder="sk-ant-..." style="margin-bottom:8px;font-family:monospace;font-size:12px">
      <button class="b" onclick="saveKey()" style="width:100%;padding:9px;font-size:12px;font-weight:700;color:var(--ac)">Sačuvaj Ključ 🔑</button>
      <div id="kst" style="font-size:11px;color:var(--tx2);margin-top:6px;text-align:center"></div>
    </div>
    <div class="c sec" style="margin-bottom:12px">
      <div class="st" style="color:var(--ac)">🎨 Tema</div>
      <div style="display:flex;gap:10px">
        <button class="b" onclick="setTh('light')" style="flex:1;padding:10px;font-size:13px;font-weight:700">☀️ Svetla</button>
        <button class="b" onclick="setTh('dark')" style="flex:1;padding:10px;font-size:13px;font-weight:700">🌙 Tamna</button>
      </div>
    </div>
    <div class="c sec" style="margin-bottom:12px">
      <div class="st" style="color:var(--ac)">🤖 AI Mod</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="b" onclick="setPer('normal')" style="padding:10px;font-size:12px;font-weight:700">😊 Normal</button>
        <button class="b" onclick="setPer('pro')" style="padding:10px;font-size:12px;font-weight:700">🎓 Pro</button>
        <button class="b" onclick="setPer('sveznalica')" style="padding:10px;font-size:12px;font-weight:700">🧠 Sveznalica</button>
        <button class="b" onclick="setPer('saljivi')" style="padding:10px;font-size:12px;font-weight:700">😂 Šaljivi</button>
      </div>
    </div>
    <div class="c sec" style="margin-bottom:12px">
      <div class="st" style="color:var(--ac)">🔊 Jačina glasa</div>
      <input type="range" min="0" max="100" value="80" id="vr" oninput="document.getElementById('vv').textContent=this.value+'%'" style="width:100%;accent-color:var(--ac);margin-bottom:6px">
      <div style="text-align:center;font-size:12px;color:var(--tx2)" id="vv">80%</div>
    </div>
    <div class="c sec" style="margin-bottom:12px">
      <div class="st" style="color:var(--ac)">🖼 Avatar</div>
      <div style="display:flex;gap:10px">
        <button class="b" id="avbtn" onclick="togAv()" style="flex:1;padding:10px;font-size:12px;font-weight:700">🙈 Skriven</button>
        <label class="b" style="flex:1;padding:10px;font-size:12px;font-weight:700;color:var(--ac);cursor:pointer;text-align:center">
          📸 Foto<input type="file" accept="image/*" style="display:none" onchange="upAv(this)">
        </label>
      </div>
    </div>
  </div>
</div>

<!-- AVATAR -->
<div id="avf" style="display:none;position:fixed;left:20px;top:300px;z-index:1000;cursor:grab">
  <div id="avb" style="width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;background:linear-gradient(145deg,#f0f4f8,#d9e2ec);box-shadow:var(--sh)"></div>
</div>

<audio id="aud" style="display:none"></audio>

<script>
const PC={normal:"#00c8b4",pro:"#6ab4ff",sveznalica:"#ffb347",saljivi:"#ff7eb3"};
const SYS={
  normal:"Ti si ljubazan AI asistent koji govori srpski. Odgovaraj kratko i korisno.",
  pro:"Ti si profesionalni AI ekspert koji govori srpski. Davaj precizne, detaljne odgovore.",
  sveznalica:"Ti si sveznalica koji govori srpski. Odgovaraj opširno sa zanimljivim detaljima.",
  saljivi:"Ti si duhoviti AI komičar koji govori srpski. Dodaj šalu ali budi koristan."
};
const EVCOL=["#00c8b4","#6ab4ff","#ffb347","#ff7eb3","#b47eff"];
const NICO=["📋","📝","🗒️","📓","📔","📕","🗃️"];

let S={
  tab:"pregled",lis:false,spk:false,thk:false,auto:false,
  per:"normal",theme:"light",msgs:[],
  ch:[{r:"a",t:"Zdravo! Ja sam tvoj AI asistent. Kako mogu pomoći?"}],
  notes:[
    {id:1,title:"Shopping lista",items:["Hleb","Mleko","Jaja"],icon:"📋"},
    {id:2,title:"Ideje",items:["Plan A","Plan B"],icon:"📝"},
  ],
  alarms:[
    {id:1,label:"Jutarnji",time:"07:00",active:true,fired:false},
    {id:2,label:"Trening",time:"18:30",active:true,fired:false},
  ],
  events:[
    {id:1,title:"Sastanak",time:"14:00",color:"#00c8b4"},
    {id:2,title:"Paket",time:"15:30",color:"#6ab4ff"},
    {id:3,title:"Gaming",time:"17:00",color:"#ff7eb3"},
  ],
  todos:[{id:1,text:"Završi izveštaj",done:false},{id:2,text:"Kupi mleko",done:false}],
  avShow:false,avSrc:null,key:""
};

// CLOCK
function updClk(){
  const n=new Date();
  document.getElementById("clk").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");
  document.getElementById("dbar").textContent=n.toLocaleDateString("sr-RS",{weekday:"long",day:"numeric",month:"long"});
}
setInterval(updClk,1000);updClk();

// ALARM ENGINE
setInterval(()=>{
  const n=new Date();
  S.alarms.forEach(a=>{
    if(!a.active||a.fired)return;
    const[h,m]=a.time.split(":").map(Number);
    if(n.getHours()===h&&n.getMinutes()===m&&n.getSeconds()<5){a.fired=true;spk(`${a.label}! Vreme je!`);rAll();}
  });
},2000);

// TABS
function sw(t){
  S.tab=t;
  ["pregled","beleske","alarmi","termini"].forEach(x=>{
    const el=document.getElementById("t"+x[0]);if(el)el.style.display=x===t?"block":"none";
  });
  document.querySelectorAll(".tb").forEach(b=>{
    b.classList.toggle("on",b.dataset.t===t);
    b.style.color=b.classList.contains("on")?PC[S.per]:"";
  });
  rAll();
}
document.querySelectorAll(".tb").forEach(b=>b.addEventListener("click",()=>sw(b.dataset.t)));

// RENDER
function rAll(){
  rNW();rAW();rEMi();rTL();rTD();rNF();rAF();rEF();updAC();
}

function rNW(){
  const el=document.getElementById("nw");if(!el)return;

function rAW(){
  const el=document.getElementById("aw");if(!el)return;
  el.innerHTML=S.alarms.filter(a=>a.active).slice(0,3).map(a=>`<div class="i ri" style="margin-bottom:6px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:16px">🕐</span><div><div style="font-size:11px;font-weight:700">${a.label}</div><div style="font-size:10px;color:var(--tx2)">${a.time}</div></div></div><div class="bdg" style="background:${a.fired?"#aaa":"#ff4444"}">${a.fired?"✓":"!"}</div></div>`).join("");
}
function rEMi(){
  const el=document.getElementById("emi");if(!el)return;
  el.innerHTML=S.events.slice(0,2).map(e=>`<div class="i ri" style="margin-bottom:6px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:14px">📆</span><span style="font-size:11px;font-weight:700">${e.title}</span></div><div class="tg" style="background:${e.color}">${e.time}</div></div>`).join("");

function rTL(){

function rTD(){
  const el=document.getElementById("tdl");if(!el)return;
  el.innerHTML=S.todos.map(t=>`<div class="i ri" onclick="togTd(${t.id})" style="cursor:pointer;margin-bottom:6px"><div style="display:flex;align-items:center;gap:8px"><div style="width:16px;height:16px;border-radius:50%;border:2px solid ${t.done?PC[S.per]:"#aaa"};background:${t.done?PC[S.per]:"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0">${t.done?'<span style="color:#fff;font-size:9px">✓</span>':""}</div><span style="font-size:11px;font-weight:600;${t.done?"text-decoration:line-through;opacity:.5":""}">${t.text}</span></div></div>`).join("");
}
function rNF(){
  const el=document.getElementById("nf");if(!el)return;
  el.innerHTML=S.notes.map(n=>`<div class="c sec" style="margin-bottom:12px;animation:si .3s ease"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">${n.icon}</span><span style="font-size:14px;font-weight:800">${n.title}</span></div><button class="b" onclick="delN(${n.id})" style="padding:4px 8px;font-size:12px;color:#ff6666">✕</button></div><div style="display:flex;flex-wrap:wrap;gap:6px">${n.items.map(i=>`<span class="i" style="padding:4px 10px;font-size:11px;font-weight:600">${i}</span>`).join("")}</div></div>`).join("");

function rAF(){
  const el=document.getElementById("af");if(!el)return;
  el.innerHTML=S.alarms.map(a=>`<div class="c" style="padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;animation:si .3s ease"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:24px">⏰</span><div><div style="font-size:14px;font-weight:800">${a.label}</div><div style="font-size:12px;color:${PC[S.per]};font-weight:700">${a.time}</div>${a.fired?'<div style="font-size:10px;color:#aaa">Oglasio se ✓</div>':""}</div></div><div style="display:flex;gap:8px;align-items:center"><div class="tgl" style="background:${a.active?`linear-gradient(90deg,${PC[S.per]},#00a896)`:"#ccc"}" onclick="togAl(${a.id})"><div class="tgl-k" style="left:${a.active?"20px":"3px"}"></div></div><button class="b" onclick="delA(${a.id})" style="padding:4px 8px;font-size:12px;color:#ff6666">✕</button></div></div>`).join("");
}
function rEF(){
  const el=document.getElementById("ef");if(!el)return;
  el.innerHTML=[...S.events].sort((a,b)=>a.time.localeCompare(b.time)).map(e=>`<div class="c" style="padding:12px 14px;margin-bottom:10px;border-left:4px solid ${e.color};animation:si .3s ease"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:800">${e.title}</div><div style="font-size:12px;color:${e.color};font-weight:700">🕐 ${e.time}</div></div><button class="b" onclick="delE(${e.id})" style="padding:4px 8px;font-size:12px;color:#ff6666">✕</button></div></div>`).join("");
}
function updAC(){document.documentElement.style.setProperty("--ac",PC[S.per]);}

// CRUD
function addN(){const t=document.getElementById("nt").value.trim(),its=document.getElementById("ni").value.split("\n").filter(Boolean);if(!t)return;S.notes.push({id:Date.now(),title:t,items:its,icon:NICO[Math.floor(Math.random()*NICO.length)]});document.getElementById("nt").value="";document.getElementById("ni").value="";rAll();}
function delN(id){S.notes=S.notes.filter(n=>n.id!==id);rAll();}
function addA(){const l=document.getElementById("al").value.trim(),t=document.getElementById("at").value;if(!l||!t)return;S.alarms.push({id:Date.now(),label:l,time:t,active:true,fired:false});document.getElementById("al").value="";document.getElementById("at").value="";rAll();}
function delA(id){S.alarms=S.alarms.filter(a=>a.id!==id);rAll();}
function togAl(id){const a=S.alarms.find(x=>x.id===id);if(a){a.active=!a.active;a.fired=false;}rAll();}
function addEv(){const t=document.getElementById("et").value.trim(),tm=document.getElementById("etm").value;if(!t||!tm)return;S.events.push({id:Date.now(),title:t,time:tm,color:EVCOL[Math.floor(Math.random()*EVCOL.length)]});document.getElementById("et").value="";document.getElementById("etm").value="";rAll();}
function delE(id){S.events=S.events.filter(e=>e.id!==id);rAll();}
function addTd(){const t=document.getElementById("tdi").value.trim();if(!t)return;S.todos.push({id:Date.now(),text:t,done:false});document.getElementById("tdi").value="";rTD();}
function togTd(id){const t=S.todos.find(x=>x.id===id);if(t)t.done=!t.done;rTD();}
document.getElementById("tdi").addEventListener("keydown",e=>{if(e.key==="Enter")addTd();});

// SPEECH
let voices=[];
speechSynthesis.onvoiceschanged=()=>{voices=speechSynthesis.getVoices();};
function spk(txt){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang="sr-RS";u.rate=0.95;u.pitch=1.05;
  u.volume=parseInt(document.getElementById("vr").value||80)/100;
  const v=voices.find(x=>x.lang.startsWith("sr")||x.lang.startsWith("hr")||x.lang.startsWith("bs"));
  if(v)u.voice=v;
  u.onstart=()=>{S.spk=true;updMic();showSt("AI govori...");avGlow(true);};
  u.onend=()=>{S.spk=false;updMic();hideSt();avGlow(false);if(S.auto&&!S.lis)setTimeout(startLis,600);};
  speechSynthesis.speak(u);
}

// RECOGNITION
let rec=null;
function startLis(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showAiTxt("Browser ne podržava prepoznavanje govora. Koristite Chrome.");return;}
  rec=new SR();rec.lang="sr-RS";rec.interimResults=true;rec.maxAlternatives=1;
  let ft="";
  rec.onstart=()=>{S.lis=true;ft="";updMic();showSt("Slušam...");};
  rec.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join("");showAiTxt(`🎤 "${t}"`);if(e.results[e.results.length-1].isFinal)ft=t;};
  rec.onerror=()=>{S.lis=false;updMic();hideSt();};
  rec.onend=()=>{S.lis=false;updMic();hideSt();if(ft.trim().length>1)hdlSpch(ft.trim());else if(S.auto)setTimeout(startLis,800);};
  rec.start();
}
function stopLis(){rec?.stop();S.lis=false;updMic();hideSt();}
function togMic(){S.lis?stopLis():startLis();}

// HANDLE SPEECH
async function hdlSpch(txt){
  if(/podseti|alarm|probudi|za\s+\d+\s+minut|za\s+\d+\s+sat/i.test(txt)){
    const p=parseAlarm(txt);
    if(p){S.alarms.push({id:Date.now(),label:p.label||"Podsetnik",time:p.time,active:true,fired:false});
      const r=`Alarm postavljen za ${p.time}!`;addMsg("a",r);showAiTxt(r);spk(r);rAll();return;}
  }
  if(!S.key){
    const k=prompt("Unesi Anthropic API ključ:");
    if(k)S.key=k; else{showAiTxt("Potreban je API ključ.");return;}
  }
  addMsg("u",txt);S.msgs.push({role:"user",content:txt});
  S.thk=true;showSt("AI razmišlja...");showAiTxt("🤔 AI razmišlja...");addDots();
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":S.key,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYS[S.per],messages:S.msgs})
    });
    const d=await r.json();
    const res=d.content?.[0]?.text||"Nisam razumeo.";
    S.msgs.push({role:"assistant",content:res});S.thk=false;hideSt();
    addMsg("a",res);showAiTxt(res);spk(res);
  }catch(e){S.thk=false;hideSt();const er="Greška u komunikaciji.";addMsg("a",er);showAiTxt(er);}
}

function parseAlarm(txt){
  const n=new Date();
  const mm=txt.match(/za\s+(\d+)\s+minut/i);
  if(mm){const t=new Date(n.getTime()+parseInt(mm[1])*60000);return{time:`${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`,label:"Podsetnik"};}
  const hm=txt.match(/za\s+(\d+)\s+sat/i);
  if(hm){const t=new Date(n.getTime()+parseInt(hm[1])*3600000);return{time:`${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`,label:"Podsetnik"};}
  const tm=txt.match(/(\d{1,2})[:\s](\d{2})/);
  if(tm)return{time:`${String(tm[1]).padStart(2,"0")}:${tm[2]}`,label:txt};
  return null;
}

// CHAT
function addMsg(r,t){
  S.ch.push({r,t});
  const el=document.getElementById("cmsg");if(!el)return;
  const dots=el.querySelector(".dots");if(dots)dots.remove();
  const d=document.createElement("div");d.className=`msg ${r}`;d.textContent=t;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function addDots(){
  const el=document.getElementById("cmsg");if(!el)return;
  const d=document.createElement("div");d.className="dots";
  d.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function sndChat(){const inp=document.getElementById("ci");if(!inp)return;const t=inp.value.trim();if(!t)return;inp.value="";hdlSpch(t);}
function rChatHist(){
  const el=document.getElementById("cmsg");if(!el)return;
  el.innerHTML=S.ch.map(m=>`<div class="msg ${m.r}">${m.t}</div>`).join("");
  el.scrollTop=el.scrollHeight;
}

// UI
function updMic(){
  const on=S.lis;
  ["mM","mm","mC"].forEach(id=>{const el=document.getElementById(id);if(el){el.className=(id==="mM"?"mbig ":"msm ")+(on?"on":"");}});
  ["pM","pm","pC"].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display=on?"block":"none";});
  const lb=document.getElementById("mml");if(lb){lb.textContent=on?"Slušam...":"Pritisni za govor";lb.style.color=on?PC[S.per]:"var(--tx2)";}
}
function showAiTxt(t){const el=document.getElementById("aibox");if(el)el.textContent=t;}
function showSt(t){const el=document.getElementById("sb"),tx=document.getElementById("st");if(el)el.classList.add("show");if(tx)tx.textContent=t;buildWave(true);}
function hideSt(){const el=document.getElementById("sb");if(el)el.classList.remove("show");buildWave(false);}
function buildWave(on){
  const el=document.getElementById("ws");if(!el)return;
  const hs=[12,20,28,22,18,26,14];
  el.innerHTML=hs.map((h,i)=>`<div class="wb" style="height:${on?h:4}px;transition:height .15s ease ${i*.05}s"></div>`).join("");
}

// PANELS
function togChat(){
  const el=document.getElementById("cp"),vis=el.style.display==="none"||!el.style.display;
  el.style.display=vis?"flex":"none";if(vis){rChatHist();updCSub();}
  document.getElementById("cfab").style.color=vis?PC[S.per]:"";
}
function togSet(){const el=document.getElementById("sp"),vis=el.style.display==="none"||!el.style.display;el.style.display=vis?"flex":"none";}
function clPnl(){document.getElementById("cp").style.display="none";document.getElementById("sp").style.display="none";}
function updCSub(){const el=document.getElementById("csub");if(el)el.textContent=`${S.per} • ${S.auto?"Auto ON":"Manual"}`;}

// AUTO
function togAuto(){
  S.auto=!S.auto;
  const f=document.getElementById("afab"),cb=document.getElementById("acb");
  if(f){f.textContent=S.auto?"🔴":"⚡";f.style.color=S.auto?PC[S.per]:"";}
  if(cb){cb.textContent=S.auto?"🔴 Auto ON":"⚡ Auto";cb.style.color=S.auto?PC[S.per]:"";}
  if(S.auto)setTimeout(startLis,300);else stopLis();
  updCSub();
}

// PERSONALITY
function setPer(p){S.per=p;updAC();rAll();updCSub();}

// THEME
function setTh(t){S.theme=t;document.body.classList.toggle("dk",t==="dark");}

// API KEY
function saveKey(){const v=document.getElementById("aki")?.value?.trim();if(!v)return;S.key=v;const s=document.getElementById("kst");if(s){s.textContent="✓ API ključ sačuvan!";s.style.color="#00c8b4";}}

// AVATAR
function togAv(){S.avShow=!S.avShow;const av=document.getElementById("avf"),btn=document.getElementById("avbtn");if(av)av.style.display=S.avShow?"block":"none";if(btn)btn.textContent=S.avShow?"👁 Vidljiv":"🙈 Skriven";if(S.avShow)updAvBody();}
function upAv(inp){const f=inp.files[0];if(!f)return;S.avSrc=URL.createObjectURL(f);updAvBody();}
function updAvBody(){const b=document.getElementById("avb");if(!b)return;b.innerHTML=S.avSrc?`<img src="${S.avSrc}" style="width:100%;height:100%;object-fit:cover">`:"🤖";}
function avGlow(on){const b=document.getElementById("avb");if(b)b.style.boxShadow=on?`var(--sh),0 0 20px ${PC[S.per]}88`:"var(--sh)";}

// AVATAR DRAG
let dg=false,dox=0,doy=0;
const avf=document.getElementById("avf");
avf.addEventListener("mousedown",e=>{dg=true;const r=avf.getBoundingClientRect();dox=e.clientX-r.left;doy=e.clientY-r.top;e.preventDefault();});
avf.addEventListener("touchstart",e=>{dg=true;const r=avf.getBoundingClientRect();dox=e.touches[0].clientX-r.left;doy=e.touches[0].clientY-r.top;},{passive:true});
document.addEventListener("mousemove",e=>{if(dg){avf.style.left=(e.clientX-dox)+"px";avf.style.top=(e.clientY-doy)+"px";}});
document.addEventListener("touchmove",e=>{if(dg){avf.style.left=(e.touches[0].clientX-dox)+"px";avf.style.top=(e.touches[0].clientY-doy)+"px";}},{passive:true});
document.addEventListener("mouseup",()=>dg=false);
document.addEventListener("touchend",()=>dg=false);

// INIT
rAll();sw("pregled");
</script>
